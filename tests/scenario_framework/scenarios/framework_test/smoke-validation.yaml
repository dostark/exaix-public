schema_version: "1.0.0"
id: framework-smoke-validation
title: Validate framework execution and evidence collection
pack: framework_test
tags: [smoke, framework]
request_fixture: fixtures/requests/framework_test/smoke.md
mode_support: [auto]

portals:
  - alias: portal-exoframe
    source_path: "/home/dkasymov/git/ExoFrame"

steps:
  - id: cleanup-workspace
    type: shell
    name: "Clean up existing analysis artifacts"
    command: "sh"
    args: ["-c", "rm -f Workspace/Requests/*_analysis.json"]
    input_criteria: []
    output_criteria: []

  - id: execute-analysis
    type: exoctl
    name: "Run request analysis"
    command: "request"
    args: ["--analyze", "--engine", "llm", "--file", "$REQUEST_FIXTURE", "--portal", "portal-exoframe"]
    input_criteria: []
    output_criteria:
      - id: request-created
        kind: command-exit-code
        equals: 0

  - id: wait-for-analysis
    type: wait-for-file
    name: "Wait for analysis artifact"
    args: ["**/*_analysis.json"]
    timeout_sec: 120
    input_criteria: []
    output_criteria:
      - id: analysis-file-created
        kind: file-found
        path_pattern: "**/*_analysis.json"

  - id: verify-analysis
    type: json-assert
    name: "Verify analysis content"
    file_pattern: "**/*_analysis.json"
    input_criteria:
      - id: analysis-file-exists
        kind: file-found
        path_pattern: "**/*_analysis.json"
    output_criteria:
      - id: verify-goal-extraction
        kind: json-path-equals
        path: "$.goals[0].description"
        equals: "Analyze the core architecture of the ExoFrame Scenario Framework"
        similarity_threshold: 0.8

  - id: check-journal
    type: journal-assert
    name: "Verify quality pipeline execution"
    input_criteria: []
    output_criteria:
      - id: event-logged
        kind: journal-event-exists
        event_type: "request.analyzed"
