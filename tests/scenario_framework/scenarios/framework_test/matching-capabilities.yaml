schema_version: "1.0.0"
id: framework-matching-validation
title: Validate regex flags and fuzzy text similarity
pack: framework_test
tags: [criteria, framework]
request_fixture: fixtures/requests/framework_test/regex_test.md
mode_support: [auto]
portals: []

steps:
  - id: create-readme
    type: shell
    command: "sh"
    args: [
      "-c",
      "printf '# Exa-Test README for project features\\n\\nExa-Test README for project features.\\n\\n## Features\\n- Feature 1: This is a bullet points\\n- Feature 2: Another bullet points\\n- Feature 3: Final bullet points\\n' > README.md",
    ]
    input_criteria: []
    output_criteria:
      - id: regex-case-insensitive
        kind: text-matches
        path: "README.md"
        flags: "i"
        matches:
          - "exa-test" # Should pass even if LLM writes "Exa-Test"
      - id: regex-dotall
        kind: text-matches
        path: "README.md"
        flags: "s"
        matches:
          - "Features.*bullet points" # Should pass across multiple lines
      - id: fuzzy-body-match
        kind: text-contains
        path: "README.md"
        contains: "Exa-Test README for project features"
        similarity_threshold: 0.7
