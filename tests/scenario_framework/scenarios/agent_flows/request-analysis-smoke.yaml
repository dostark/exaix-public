schema_version: "1.0.0"
id: "request-analysis-smoke"
title: "Request analysis produces a smoke-level analysis artifact"
pack: "agent_flows"
tags: ["smoke", "analysis"]
request_fixture: "fixtures/requests/agent_flows/request_analysis_smoke.md"
mode_support: ["auto", "step"]
portals: []
steps:
  - id: "create-request-analysis"
    type: "exoctl"
    command: "request"
    args: ["--analyze", "--file", "fixtures/requests/agent_flows/request_analysis_smoke.md"]
    input_criteria:
      - id: "request-fixture-exists"
        kind: "file-exists"
        path: "fixtures/requests/agent_flows/request_analysis_smoke.md"
    output_criteria:
      - id: "request-command-succeeded"
        kind: "command-exit-code"
        equals: 0
  - id: "analysis-artifact"
    type: "wait-for-file"
    input_criteria:
      - id: "request-created"
        kind: "command-exit-code"
        equals: 0
    output_criteria:
      - id: "analysis-file-found"
        kind: "file-found"
        path_pattern: "Workspace/Requests/*/_analysis.json"
