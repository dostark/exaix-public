schema_version: "1.0.0"
id: "request-analysis-smoke"
title: "Request analysis produces a smoke-level analysis artifact"
pack: "agent_flows"
tags: ["smoke", "analysis"]
request_fixture: "fixtures/requests/agent_flows/request_analysis_smoke.md"
mode_support: ["auto", "step"]
portals: []
steps:
  - id: "cleanup-workspace"
    type: "shell"
    name: "Clean up existing analysis artifacts"
    command: "sh"
    args: ["-c", "rm -f $WORKSPACE_ROOT/Workspace/Requests/*_analysis.json"]
    input_criteria: []
    output_criteria: []
  - id: "create-request-analysis"
    type: "exactl"
    command: "request"
    args: ["--analyze", "--engine", "llm", "--file", "$REQUEST_FIXTURE"]
    input_criteria: []
    output_criteria:
      - id: "request-command-succeeded"
        kind: "command-exit-code"
        equals: 0
  - id: "analysis-artifact"
    type: "wait-for-file"
    args: ["**/*_analysis.json"]
    timeout_sec: 120
    input_criteria: []
    output_criteria:
      - id: "analysis-file-found"
        kind: "file-found"
        path_pattern: "**/*_analysis.json"
