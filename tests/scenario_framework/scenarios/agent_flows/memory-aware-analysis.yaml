schema_version: "1.0.0"
id: "memory-aware-analysis"
title: "Memory-aware analysis enriches request understanding"
pack: "agent_flows"
tags: ["analysis", "smoke", "memory"]
request_fixture: "fixtures/requests/agent_flows/memory_aware_analysis.md"
mode_support: ["auto", "step"]
portals: []
steps:
  - id: "cleanup-workspace"
    type: "shell"
    name: "Clean up existing analysis artifacts"
    command: "sh"
    args: ["-c", "rm -f $WORKSPACE_ROOT/Workspace/Requests/*_analysis.json"]
    input_criteria: []
    output_criteria: []
  - id: "create-memory-aware-request"
    type: "exoctl"
    command: "request"
    args: ["--analyze", "--file", "$REQUEST_FIXTURE"]
    input_criteria:
      - id: "request-fixture-exists"
        kind: "file-exists"
        path: "$REQUEST_FIXTURE"
    output_criteria:
      - id: "request-create-exit-code"
        kind: "command-exit-code"
        equals: 0
  - id: "analysis-check"
    type: "json-assert"
    file_pattern: "**/*_analysis.json"
    input_criteria:
      - id: "analysis-json-available"
        kind: "file-found"
        path_pattern: "**/*_analysis.json"
    output_criteria:
      - id: "analysis-goal-present"
        kind: "json-path-exists"
        path: "$.goals[0]"
