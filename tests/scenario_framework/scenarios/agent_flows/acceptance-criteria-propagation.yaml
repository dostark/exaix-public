schema_version: "1.0.0"
id: "acceptance-criteria-propagation"
title: "Propagates acceptance criteria into evaluation outputs"
pack: "agent_flows"
tags: ["provider-live", "criteria"]
request_fixture: "fixtures/requests/agent_flows/acceptance_criteria_propagation.md"
mode_support: ["auto"]
portals: []
steps:
  - id: "create-request"
    type: "exactl"
    command: "request"
    args: ["--file", "$REQUEST_FIXTURE"]
    input_criteria:
      - id: "request-fixture-exists"
        kind: "file-exists"
        path: "$REQUEST_FIXTURE"
    output_criteria:
      - id: "request-create-exit-code"
        kind: "command-exit-code"
        equals: 0
  - id: "wait-for-analysis"
    type: "wait-for-file"
    args: ["**/*_analysis.json"]
    timeout_sec: 120
    input_criteria: []
    output_criteria: []
  - id: "review-criteria"
    type: "json-assert"
    file_pattern: "**/*_analysis.json"
    input_criteria:
      - id: "analysis-json-available"
        kind: "file-found"
        path_pattern: "**/*_analysis.json"
    output_criteria:
      - id: "goal-propagation-present"
        kind: "json-path-exists"
        path: "$.goals[0]"
