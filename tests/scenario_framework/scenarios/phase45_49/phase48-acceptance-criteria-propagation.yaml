schema_version: "1.0.0"
id: "phase48-acceptance-criteria-propagation"
title: "Phase 48 propagates acceptance criteria into evaluation outputs"
pack: "phase45_49"
tags: ["phase48", "provider-live", "criteria"]
request_fixture: "fixtures/requests/phase45_49/phase48_acceptance_criteria_propagation.md"
mode_support: ["auto"]
portals: []
steps:
  - id: "phase48-create-request"
    type: "exoctl"
    command: "request create"
    args: ["--from-file", "fixtures/requests/phase45_49/phase48_acceptance_criteria_propagation.md"]
    input_criteria:
      - id: "phase48-request-fixture-exists"
        kind: "file-exists"
        path: "fixtures/requests/phase45_49/phase48_acceptance_criteria_propagation.md"
    output_criteria:
      - id: "phase48-request-create-exit-code"
        kind: "command-exit-code"
        equals: 0
  - id: "phase48-review-criteria"
    type: "json-assert"
    input_criteria:
      - id: "phase48-analysis-json-available"
        kind: "file-found"
        path_pattern: "Workspace/Requests/*/_analysis.json"
    output_criteria:
      - id: "phase48-goal-propagation-present"
        kind: "json-path-exists"
        path: "$.goals[0]"
        target_file: "Workspace/Requests/latest/_analysis.json"
