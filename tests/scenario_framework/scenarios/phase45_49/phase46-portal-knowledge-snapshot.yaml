schema_version: "1.0.0"
id: "phase46-portal-knowledge-snapshot"
title: "Phase 46 portal knowledge gathers a snapshot for a mounted portal"
pack: "phase45_49"
tags: ["phase46", "smoke", "portal"]
request_fixture: "fixtures/requests/phase45_49/phase46_portal_knowledge_snapshot.md"
mode_support: ["auto", "step"]
portals:
  - alias: "portal-sample-app"
    source_path: "/tmp/portal-sample-app"
steps:
  - id: "phase46-portal-mounted"
    type: "exoctl"
    command: "portal analyze portal-sample-app"
    input_criteria:
      - id: "phase46-portal-available"
        kind: "portal-mounted"
        alias: "portal-sample-app"
    output_criteria:
      - id: "phase46-portal-analyze-exit-code"
        kind: "command-exit-code"
        equals: 0
  - id: "phase46-knowledge-artifact"
    type: "wait-for-file"
    input_criteria:
      - id: "phase46-analyze-succeeded"
        kind: "command-exit-code"
        equals: 0
    output_criteria:
      - id: "phase46-knowledge-json-found"
        kind: "file-found"
        path_pattern: "Memory/Projects/*/knowledge.json"
