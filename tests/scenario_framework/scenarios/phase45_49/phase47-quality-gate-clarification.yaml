schema_version: "1.0.0"
id: "phase47-quality-gate-clarification"
title: "Phase 47 quality gate pauses for clarification on underspecified requests"
pack: "phase45_49"
tags: ["phase47", "manual-only", "clarification"]
request_fixture: "fixtures/requests/phase45_49/phase47_quality_gate_clarification.md"
mode_support: ["manual-checkpoint"]
portals: []
steps:
  - id: "phase47-create-request"
    type: "exoctl"
    command: "request create"
    args: ["--from-file", "fixtures/requests/phase45_49/phase47_quality_gate_clarification.md"]
    input_criteria:
      - id: "phase47-request-fixture-exists"
        kind: "file-exists"
        path: "fixtures/requests/phase45_49/phase47_quality_gate_clarification.md"
    output_criteria:
      - id: "phase47-request-create-exit-code"
        kind: "command-exit-code"
        equals: 0
  - id: "phase47-review-clarification"
    type: "manual-review"
    checkpoint: "clarification-needed"
    instructions: "Review the clarification prompts and confirm the request remains blocked pending answers."
    input_criteria:
      - id: "phase47-clarification-artifact"
        kind: "file-found"
        path_pattern: "Workspace/Requests/*/_clarification.json"
    output_criteria:
      - id: "phase47-review-ready"
        kind: "text-contains"
        path: "fixtures/requests/phase45_49/phase47_quality_gate_clarification.md"
        contains: "underspecified"
