name: Code Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js (for jscpd/complexity-report)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache dependencies
        run: deno cache src/main.ts tests/**/*.ts || true

      - name: Format Check
        run: deno fmt --check

      - name: Lint Check
        run: deno lint

      - name: Code Duplication Check
        run: deno run --allow-run --allow-read --allow-write scripts/measure_duplication.ts --threshold 2.0

      - name: Complexity Check
        run: |
          deno run --allow-read --allow-net scripts/measure_complexity.ts --threshold 15 --json > complexity.json
          deno run --allow-read scripts/check_complexity_breaches.ts

      - name: Test & Coverage
        run: deno run --allow-run --allow-read --allow-write scripts/measure_coverage.ts

      - name: Build Verification
        run: deno check src/main.ts

      - name: Architecture Validation
        run: deno task check:arch
