name: Code Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js (for jscpd/complexity-report)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache dependencies
        run: deno cache src/main.ts tests/**/*.ts || true

      - name: Format Check
        run: deno fmt --check

      - name: Lint Check
        run: deno lint

      - name: Code Duplication Check
        run: deno run --allow-run --allow-read --allow-write scripts/measure_duplication.ts --threshold 2.0

      - name: Complexity Check
        run: |
          deno run --allow-read --allow-net scripts/measure_complexity.ts --threshold 15 --json > complexity.json
          deno eval --unstable --allow-read "const txt=await Deno.readTextFile('complexity.json'); const obj=JSON.parse(txt); const files=(obj.exceeding?.files||[]).length; const fns=(obj.exceeding?.functions||[]).length; console.log(`Complexity breaches: files=${files}, functions=${fns}`); if(files>0||fns>0) Deno.exit(1);"

      - name: Test & Coverage
        run: deno run --allow-run --allow-read --allow-write scripts/measure_coverage.ts

      - name: Build Verification
        run: deno check src/main.ts
