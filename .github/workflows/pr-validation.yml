name: "PR Validation"

on:
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Deno"
        uses: denoland/setup-deno@v1
        with:
          deno-version: '1.40.5'

      - name: "Configure git identity (CI)"
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"

      - name: "CI debug: show commit and config (Linux only)"
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "EXO_CONFIG_PATH=$EXO_CONFIG_PATH"
          echo "Workspace listing:" && ls -la
          if [ -f exo.config.toml ]; then
            echo "--- exo.config.toml ---"
            sed -n '1,200p' exo.config.toml
            echo "--- end exo.config.toml ---"
          else
            echo "exo.config.toml not found in workspace"
          fi

      - name: "Run Checks"
        run: deno run -A scripts/ci.ts check

      - name: "Run Quick Tests"
        run: deno run -A scripts/ci.ts test --quick
