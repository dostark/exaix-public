name: Merge Validation

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Deno"
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: "Configure git identity (CI)"
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"

      - name: "CI debug: show commit and config"
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "EXA_CONFIG_PATH=$EXA_CONFIG_PATH"
          echo "Workspace listing:" && ls -la
          if [ -f exa.config.toml ]; then
            echo "--- exa.config.toml ---"
            sed -n '1,200p' exa.config.toml
            echo "--- end exa.config.toml ---"
          else
            echo "exa.config.toml not found in workspace"
          fi

      - name: "Run Full Pipeline"
        run: deno run -A scripts/ci.ts all

      # Placeholder for coverage upload
      # - name: Upload Coverage
      #   uses: codecov/codecov-action@v3
