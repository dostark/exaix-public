name: Complexity Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  complexity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run complexity script (JSON)
        run: |
          deno run --allow-read --allow-net scripts/measure_complexity.ts --threshold 20 --json > complexity.json

      - name: Fail on complexity breaches
        run: |
          deno run --allow-read scripts/check_complexity_breaches.ts
