name: Complexity Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  complexity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run complexity script (JSON)
        run: |
          deno run --allow-read --allow-net scripts/measure_complexity.ts --threshold 10 --json > complexity.json

      - name: Fail on complexity breaches
        run: |
          deno eval --unstable "
          const txt = await Deno.readTextFile('complexity.json');
          const obj = JSON.parse(txt);
          const files = obj.exceeding?.files?.length || 0;
          const fns = obj.exceeding?.functions?.length || 0;
          console.log(`Complexity breaches: files=${files}, functions=${fns}`);
          if (files > 0 || fns > 0) Deno.exit(1);
          "
