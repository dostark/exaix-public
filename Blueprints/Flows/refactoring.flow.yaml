id: refactoring
name: Code Refactoring Flow
description: 'Safe code refactoring with analysis, implementation, and validation'
version: 1.0.0
defaultSkills:
  - clean-code
steps:
  - id: analyze-current-code
    name: Analyze Current Code
    type: agent
    agent: code-analyst
    dependsOn: []
    input:
      source: request
      transform: passthrough
    retry:
      maxAttempts: 2
      backoffMs: 1000
  - id: identify-improvements
    name: Identify Improvement Opportunities
    type: agent
    agent: software-architect
    dependsOn:
      - analyze-current-code
    input:
      source: step
      stepId: analyze-current-code
      transform: mergeAsContext
    retry:
      maxAttempts: 1
      backoffMs: 1000
  - id: assess-risks
    name: Assess Refactoring Risks
    type: agent
    agent: qa-engineer
    dependsOn:
      - identify-improvements
    input:
      source: step
      stepId: identify-improvements
      transform: mergeAsContext
    timeout: 30000
    retry:
      maxAttempts: 1
      backoffMs: 1000
  - id: write-safety-tests
    name: Write Safety Tests
    type: agent
    agent: test-engineer
    dependsOn:
      - analyze-current-code
    input:
      source: step
      stepId: analyze-current-code
      transform: mergeAsContext
    retry:
      maxAttempts: 2
      backoffMs: 1000
  - id: implement-refactoring
    name: Implement Refactoring
    type: agent
    agent: senior-coder
    dependsOn:
      - identify-improvements
      - assess-risks
      - write-safety-tests
    input:
      source: aggregate
      from:
        - identify-improvements
        - assess-risks
        - write-safety-tests
      transform: mergeAsContext
    timeout: 90000
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: validate-refactoring
    name: Validate Refactoring
    type: agent
    agent: qa-engineer
    dependsOn:
      - implement-refactoring
    input:
      source: aggregate
      from:
        - write-safety-tests
        - implement-refactoring
      transform: mergeAsContext
    retry:
      maxAttempts: 1
      backoffMs: 1000
  - id: final-review
    name: Final Code Review
    type: agent
    agent: quality-judge
    dependsOn:
      - validate-refactoring
    input:
      source: aggregate
      from:
        - analyze-current-code
        - implement-refactoring
        - validate-refactoring
      transform: mergeAsContext
    retry:
      maxAttempts: 1
      backoffMs: 1000
output:
  from: final-review
  format: markdown
settings:
  maxParallelism: 2
  failFast: true
  timeout: 360000
  includeRequestCriteria: false
