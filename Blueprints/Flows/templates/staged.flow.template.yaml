id: staged-template
name: Staged Flow Template
description: Template for multi-stage processing workflows
version: 1.0.0
steps:
  - id: stage-1-planning
    name: "Stage 1: Planning & Analysis"
    type: agent
    identity: planner-agent
    dependsOn: []
    input:
      source: request
      transform: passthrough
    retry:
      maxAttempts: 1
      backoffMs: 1000
  - id: stage-2-development
    name: "Stage 2: Development & Implementation"
    type: agent
    identity: developer-agent
    dependsOn:
      - stage-1-planning
    input:
      source: step
      stepId: stage-1-planning
      transform: passthrough
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: stage-3-validation
    name: "Stage 3: Validation & Testing"
    type: agent
    identity: tester-agent
    dependsOn:
      - stage-2-development
    input:
      source: aggregate
      from:
        - stage-1-planning
        - stage-2-development
      transform: merge_as_context
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: stage-4-review
    name: "Stage 4: Review & Refinement"
    type: agent
    identity: reviewer-agent
    dependsOn:
      - stage-3-validation
    input:
      source: aggregate
      from:
        - stage-1-planning
        - stage-2-development
        - stage-3-validation
      transform: merge_as_context
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: stage-5-deployment
    name: "Stage 5: Deployment & Documentation"
    type: agent
    identity: deployer-agent
    dependsOn:
      - stage-4-review
    input:
      source: aggregate
      from:
        - stage-2-development
        - stage-4-review
      transform: merge_as_context
    retry:
      maxAttempts: 1
      backoffMs: 1000
output:
  from: stage-5-deployment
  format: markdown
settings:
  maxParallelism: 1
  failFast: true
  timeout: 900000
  includeRequestCriteria: false
