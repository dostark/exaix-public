id: llm-judge-code-review
name: LLM-as-a-Judge Code Review
description: Multi-perspective code review with LLM judge for final assessment
version: 1.0.0
steps:
  - id: analyze-code
    name: Analyze Code Structure
    type: agent
    agent: code-analyzer
    dependsOn: []
    input:
      source: request
      transform: passthrough
    retry:
      maxAttempts: 2
      backoffMs: 1000
  - id: security-review
    name: Security Analysis
    type: agent
    agent: security-reviewer
    dependsOn:
      - analyze-code
    input:
      source: step
      stepId: analyze-code
      transform: append_to_request
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: quality-review
    name: Code Quality Analysis
    type: agent
    agent: quality-reviewer
    dependsOn:
      - analyze-code
    input:
      source: step
      stepId: analyze-code
      transform: append_to_request
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: judge-evaluation
    name: Judge Final Assessment
    type: agent
    agent: quality-judge
    dependsOn:
      - security-review
      - quality-review
    input:
      source: aggregate
      from:
        - analyze-code
        - security-review
        - quality-review
      transform: merge_as_context
    timeout: 60000
    retry:
      maxAttempts: 1
      backoffMs: 3000
  - id: generate-report
    name: Generate Final Report
    type: agent
    agent: technical-writer
    dependsOn:
      - judge-evaluation
    input:
      source: aggregate
      from:
        - analyze-code
        - security-review
        - quality-review
        - judge-evaluation
      transform: merge_as_context
    retry:
      maxAttempts: 1
      backoffMs: 1000
output:
  from: generate-report
  format: markdown
settings:
  maxParallelism: 2
  failFast: false
  timeout: 300000
  includeRequestCriteria: false
