id: research-synthesis-flow
name: Research Synthesis and Analysis
description: >-
  Multi-source research synthesis with comprehensive analysis and
  recommendations
version: 1.0.0
steps:
  - id: literature-review
    name: Literature Review & Academic Research
    type: agent
    agent: literature-researcher
    dependsOn: []
    input:
      source: request
      transform: passthrough
    retry:
      maxAttempts: 2
      backoffMs: 3000
  - id: data-analysis
    name: Data Analysis & Quantitative Research
    type: agent
    agent: data-researcher
    dependsOn: []
    input:
      source: request
      transform: passthrough
    retry:
      maxAttempts: 2
      backoffMs: 3000
  - id: expert-insights
    name: Expert Insights & Qualitative Analysis
    type: agent
    agent: expert-consultant
    dependsOn: []
    input:
      source: request
      transform: passthrough
    retry:
      maxAttempts: 2
      backoffMs: 3000
  - id: methodology-assessment
    name: Methodology Assessment
    type: agent
    agent: methodology-expert
    dependsOn: []
    input:
      source: request
      transform: passthrough
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: gap-analysis
    name: Research Gaps & Future Directions
    type: agent
    agent: strategic-analyst
    dependsOn:
      - literature-review
      - data-analysis
      - expert-insights
    input:
      source: aggregate
      from:
        - literature-review
        - data-analysis
        - expert-insights
      transform: merge_as_context
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: comprehensive-synthesis
    name: Comprehensive Synthesis & Recommendations
    type: agent
    agent: synthesis-analyst
    dependsOn:
      - literature-review
      - data-analysis
      - expert-insights
      - methodology-assessment
      - gap-analysis
    input:
      source: aggregate
      from:
        - literature-review
        - data-analysis
        - expert-insights
        - methodology-assessment
        - gap-analysis
      transform: merge_as_context
    retry:
      maxAttempts: 2
      backoffMs: 5000
output:
  from: comprehensive-synthesis
  format: markdown
settings:
  maxParallelism: 4
  failFast: false
  timeout: 1200000
  includeRequestCriteria: false
