id: feature-development-flow
name: Feature Development Workflow
description: >-
  End-to-end feature development with planning, implementation, testing, and
  documentation
version: 1.0.0
steps:
  - id: requirements-analysis
    name: Requirements Analysis & Planning
    type: agent
    identity: product-manager
    dependsOn: []
    input:
      source: request
      transform: passthrough
    retry:
      maxAttempts: 1
      backoffMs: 1000
  - id: technical-design
    name: Technical Design & Architecture
    type: agent
    identity: senior-developer
    dependsOn:
      - requirements-analysis
    input:
      source: step
      stepId: requirements-analysis
      transform: passthrough
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: implementation
    name: Implementation & Coding
    type: agent
    identity: senior-developer
    dependsOn:
      - technical-design
    input:
      source: aggregate
      from:
        - requirements-analysis
        - technical-design
      transform: merge_as_context
    retry:
      maxAttempts: 3
      backoffMs: 5000
  - id: unit-testing
    name: Unit Testing & Validation
    type: agent
    identity: qa-engineer
    dependsOn:
      - implementation
    input:
      source: aggregate
      from:
        - requirements-analysis
        - technical-design
        - implementation
      transform: merge_as_context
    retry:
      maxAttempts: 2
      backoffMs: 3000
  - id: integration-testing
    name: Integration Testing
    type: agent
    identity: qa-engineer
    dependsOn:
      - unit-testing
    input:
      source: aggregate
      from:
        - requirements-analysis
        - implementation
        - unit-testing
      transform: merge_as_context
    retry:
      maxAttempts: 2
      backoffMs: 3000
  - id: documentation
    name: Documentation & User Guide
    type: agent
    identity: technical-writer
    dependsOn:
      - integration-testing
    input:
      source: aggregate
      from:
        - requirements-analysis
        - technical-design
        - implementation
        - integration-testing
      transform: merge_as_context
    retry:
      maxAttempts: 2
      backoffMs: 2000
output:
  from: documentation
  format: markdown
settings:
  maxParallelism: 1
  failFast: true
  timeout: 1800000
  includeRequestCriteria: false
