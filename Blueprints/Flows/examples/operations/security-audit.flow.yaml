id: security-audit-flow
name: Comprehensive Security Audit
description: >-
  Multi-dimensional security assessment with risk analysis and remediation
  recommendations
version: 1.0.0
steps:
  - id: code-security-scan
    name: Code Security Analysis
    type: agent
    agent: code-security-auditor
    dependsOn: []
    input:
      source: request
      transform: extract_code
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: infrastructure-security
    name: Infrastructure Security Assessment
    type: agent
    agent: infrastructure-security-auditor
    dependsOn: []
    input:
      source: request
      transform: passthrough
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: compliance-check
    name: Compliance & Regulatory Review
    type: agent
    agent: compliance-auditor
    dependsOn: []
    input:
      source: request
      transform: passthrough
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: dependency-analysis
    name: Dependency & Supply Chain Security
    type: agent
    agent: dependency-auditor
    dependsOn: []
    input:
      source: request
      transform: extract_code
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: risk-assessment
    name: Risk Assessment & Prioritization
    type: agent
    agent: risk-assessor
    dependsOn:
      - code-security-scan
      - infrastructure-security
      - compliance-check
      - dependency-analysis
    input:
      source: aggregate
      from:
        - code-security-scan
        - infrastructure-security
        - compliance-check
        - dependency-analysis
      transform: merge_as_context
    retry:
      maxAttempts: 2
      backoffMs: 3000
  - id: remediation-planning
    name: Remediation Planning & Recommendations
    type: agent
    agent: security-synthesizer
    dependsOn:
      - risk-assessment
    input:
      source: aggregate
      from:
        - code-security-scan
        - infrastructure-security
        - compliance-check
        - dependency-analysis
        - risk-assessment
      transform: merge_as_context
    retry:
      maxAttempts: 2
      backoffMs: 5000
output:
  from: remediation-planning
  format: markdown
settings:
  maxParallelism: 4
  failFast: false
  timeout: 900000
  includeRequestCriteria: false
