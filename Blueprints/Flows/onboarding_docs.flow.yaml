id: onboarding-docs
name: Onboarding Documentation Flow
description: Generate comprehensive onboarding documentation for a codebase
version: 1.0.0
steps:
  - id: analyze-project-structure
    name: Analyze Project Structure
    type: agent
    agent: code-analyst
    dependsOn: []
    input:
      source: request
      transform: passthrough
    timeout: 90000
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: identify-key-concepts
    name: Identify Key Concepts & Patterns
    type: agent
    agent: software-architect
    dependsOn:
      - analyze-project-structure
    input:
      source: step
      stepId: analyze-project-structure
      transform: mergeAsContext
    timeout: 60000
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: generate-quickstart
    name: Generate Quick Start Guide
    type: agent
    agent: technical-writer
    dependsOn:
      - analyze-project-structure
    input:
      source: step
      stepId: analyze-project-structure
      transform: appendToRequest
      transformArgs:
        suffix: |-


          Create a quick start guide for developers new to this project.
    timeout: 60000
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: generate-architecture-overview
    name: Generate Architecture Overview
    type: agent
    agent: technical-writer
    dependsOn:
      - identify-key-concepts
    input:
      source: aggregate
      from:
        - analyze-project-structure
        - identify-key-concepts
      transform: mergeAsContext
    timeout: 60000
    retry:
      maxAttempts: 2
      backoffMs: 2000
  - id: generate-dev-setup
    name: Generate Development Setup Guide
    type: agent
    agent: technical-writer
    dependsOn:
      - analyze-project-structure
    input:
      source: step
      stepId: analyze-project-structure
      transform: appendToRequest
      transformArgs:
        suffix: |-


          Create a detailed development environment setup guide.
    timeout: 45000
    retry:
      maxAttempts: 1
      backoffMs: 1000
  - id: generate-contribution-guide
    name: Generate Contribution Guidelines
    type: agent
    agent: technical-writer
    dependsOn:
      - identify-key-concepts
    input:
      source: aggregate
      from:
        - analyze-project-structure
        - identify-key-concepts
      transform: appendToRequest
      transformArgs:
        suffix: >-


          Create contribution guidelines including code style, PR process, and
          testing requirements.
    timeout: 45000
    retry:
      maxAttempts: 1
      backoffMs: 1000
  - id: generate-glossary
    name: Generate Glossary & Terminology
    type: agent
    agent: technical-writer
    dependsOn:
      - identify-key-concepts
    input:
      source: step
      stepId: identify-key-concepts
      transform: appendToRequest
      transformArgs:
        suffix: |-


          Create a glossary of key terms and concepts used in this project.
    timeout: 30000
    retry:
      maxAttempts: 1
      backoffMs: 1000
  - id: compile-onboarding-docs
    name: Compile Onboarding Documentation
    type: agent
    agent: technical-writer
    dependsOn:
      - generate-quickstart
      - generate-architecture-overview
      - generate-dev-setup
      - generate-contribution-guide
      - generate-glossary
    input:
      source: aggregate
      from:
        - generate-quickstart
        - generate-architecture-overview
        - generate-dev-setup
        - generate-contribution-guide
        - generate-glossary
      transform: mergeAsContext
    timeout: 60000
    retry:
      maxAttempts: 1
      backoffMs: 1000
output:
  from: compile-onboarding-docs
  format: markdown
settings:
  maxParallelism: 4
  failFast: false
  timeout: 480000
  includeRequestCriteria: false
