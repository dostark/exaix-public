# ===========================================================================
# ExoFrame Configuration File
# ===========================================================================
#
# IMPORTANT: This is the ONLY file users should edit to customize ExoFrame behavior.
# NEVER modify src/config/constants.ts directly - those are internal defaults.
#
# All timing values (timeouts, delays, intervals) are in milliseconds (ms)
# unless otherwise specified.
#
# Configurable Magic Numbers Reference:
# - Database batch_flush_ms: 100 (how often to flush journal writes)
# - Database batch_max_size: 100 (max records before forced flush)
# - Database busy_timeout_ms: 5000 (SQLite lock wait time)
# - Watcher debounce_ms: 200 (file change stabilization delay)
# - Agent timeout_sec: 60 (max time for agent task completion)
# - Agent max_iterations: 10 (max flow execution loops)
# - AI timeout_ms: 30000 (per-model API request timeout)
# - AI retry max_attempts: 3 (number of retry attempts)
# - AI retry backoff_base_ms: 1000 (exponential backoff base delay)
#
# ===========================================================================
# Environment Variable Reference
# ===========================================================================
#
# ExoFrame supports the following environment variables for runtime flexibility.
# Environment variables take precedence over config file values where applicable.
#
# Production Variables (Runtime):
# ---------------------------------------------------------------------------
# EXO_LLM_PROVIDER    : Override AI provider (e.g. "ollama", "openai", "mock")
# EXO_LLM_MODEL       : Override AI model name (e.g. "llama3.2", "gpt-4")
# EXO_LLM_BASE_URL    : Override provider base URL (e.g. "http://localhost:11434")
# EXO_LLM_TIMEOUT_MS  : Override AI request timeout (1000 - 300000 ms)
#
# Testing Variables (Development/CI):
# ---------------------------------------------------------------------------
# EXO_TEST_MODE              : Set to "1" or "true" to enable test mode
# EXO_TEST_CLI_MODE          : Set to "1" to enable CLI test mode (stubs services)
# EXO_TEST_ENABLE_PAID_LLM   : Set to "1" to enable paid LLM tests (requires API keys)
# EXO_TEST_ENABLE_OLLAMA     : Set to "1" to run Ollama integration tests
# EXO_TEST_ENABLE_LLAMA      : Set to "1" to run Llama provider specific tests
# EXO_TEST_OPENAI_API_KEY    : API key for OpenAI integration tests
# EXO_CI_MODE                : Set to "1" to enforce CI behaviors (mock providers, etc.)
# CI                         : Standard CI flag (fallback if EXO_CI_MODE not set)
#
# ===========================================================================

[system]
# Human-readable config version (optional)
version = "1.0.0"
# Log level: debug | info | warn | error
log_level = "info"
# Root directory for deployed workspaces (can be absolute or relative)
root = "./"

[paths]
# Top-level workspace directory name under the deployed root
workspace = "Workspace"
# Runtime directory for DB, logs, pid files (formerly System/)
runtime = ".exo"
# Memory banks directory (copied to deployed workspaces)
memory = "Memory"
# Portals directory (symlinks to external project repos)
portals = "Portals"
# Blueprints directory for agent definitions/templates
blueprints = "Blueprints"

[database]
# Activity Journal batching configuration
# Flush interval in milliseconds for batched writes
batch_flush_ms = 100
# Maximum batch size before immediate flush
batch_max_size = 100
# Optional explicit path for the Activity Journal DB (overrides runtime path)
# If unspecified, code resolves to <root>/<paths.runtime>/journal.db
path = "./.exo/journal.db"

[database.sqlite]
# SQLite-specific performance tuning
journal_mode = "WAL"       # Write-Ahead Logging for concurrency
foreign_keys = true        # Enforce foreign key constraints
busy_timeout_ms = 5000     # Wait time when DB is locked

[watcher]
# Debounce time in ms after file events before processing
debounce_ms = 200
# Enable stability_check to verify file size/stability after debounce
stability_check = true

[agents]
# Default model preset name from [models]
default_model = "default"
# Per-agent timeout in seconds (max time for agent to complete task)
timeout_sec = 60
# Max iterations for agent flow execution
max_iterations = 10

# Example portals entries — add one [[portals]] block per portal
[[portals]]
alias = "my-repo"
target_path = "/home/me/projects/my-repo"

# Optional: default base branch for this portal when requests don't specify `target_branch`
# default_branch = "main"

# Optional: execution strategy for write-capable changes
# - "branch"   : create feature branches in the portal checkout (default)
# - "worktree" : create per-request worktrees under .exo/worktrees (opt-in)
#               : ExoFrame also creates a discoverability pointer under Memory/Execution/<traceId>/worktree/
# execution_strategy = "branch"

# ---------------------------------------------------------------------------
# AI / LLM provider configuration
# Supported providers: mock | ollama | anthropic | openai | google
#
# Recommended Models (2026 Tightened List):
# OpenAI:
#   - gpt-5-mini (Fast & Low-cost)
#   - gpt-5 (Premium Reasoning)
#   - gpt-5-pro (Top Tier)
# Anthropic:
#   - claude-haiku-4-5-20251001 (Fast - Oct 2025)
#   - claude-sonnet-4-5-20250929 (Balanced - Sep 2025)
#   - claude-opus-4-5-20251101 (Premium - Nov 2025)
# Google:
#   - gemini-flash-latest (Recommended - Always latest Flash model)
#   - gemini-2.5-flash (Stable 2025 release)
# ---------------------------------------------------------------------------
[ai]
provider = "google"     # Overridden by EXO_LLM_PROVIDER
# Provider-specific model name (optional)
model = "gemini-flash-latest"    # Overridden by EXO_LLM_MODEL
# Base URL for custom provider endpoints (optional)
base_url = ""           # Overridden by EXO_LLM_BASE_URL
# Request timeout (ms)
timeout_ms = 30000      # Overridden by EXO_LLM_TIMEOUT_MS
# Max output tokens (provider-specific)
max_tokens = 2048
# Sampling temperature (0.0 - 2.0)
temperature = 0.2

[ai.mock]
# Mock strategy: recorded | scripted | pattern | failing | slow
strategy = "recorded"
# Directory for recorded fixtures used by the mock provider
fixtures_dir = "./tests/fixtures/ai"

[ai_endpoints]
# Override default provider API endpoints (optional)
# Useful for self-hosted instances, proxies, or custom deployments
ollama = "http://localhost:11434/api/generate"
anthropic = "https://api.anthropic.com/v1/messages"
openai = "https://api.openai.com/v1/chat/completions"
google = "https://generativelanguage.googleapis.com/v1/models"

[ai_retry]
# HTTP retry configuration for LLM API calls (all providers)
max_attempts = 3           # Maximum retry attempts for transient failures
backoff_base_ms = 1000     # Base delay between retries (exponential backoff)
timeout_per_request_ms = 30000  # Timeout for individual HTTP requests

[ai_retry.providers.ollama]
max_attempts = 3
backoff_base_ms = 1000

[ai_retry.providers.anthropic]
max_attempts = 5
backoff_base_ms = 2000

[ai_retry.providers.openai]
max_attempts = 3
backoff_base_ms = 1000

[ai_retry.providers.google]
max_attempts = 3
backoff_base_ms = 1000

[ai_timeout]
# Default timeout for LLM calls in milliseconds
default_ms = 30000

[ai_timeout.providers]
google = 30000
openai = 30000
anthropic = 30000
ollama = 60000
mock = 1000

[ai_anthropic]
# Anthropic Claude-specific configuration
api_version = "2023-06-01"
default_model = "claude-haiku-4-5-20251001"
max_tokens_default = 4096

# ---------------------------------------------------------------------------
# Model-specific defaults
# Override timeout and other settings per model configuration
# ---------------------------------------------------------------------------

[models.default]
provider = "google"
model = "gemini-flash-latest"
timeout_ms = 30000         # Request timeout for this model preset
max_tokens = 2048
temperature = 0.2

[models.fast]
provider = "google"
model = "gemini-flash-latest"
timeout_ms = 15000         # Faster timeout for quick responses

[models.local]
provider = "ollama"
model = "llama3.2"
timeout_ms = 60000         # Longer timeout for local models
base_url = "http://localhost:11434/api/generate"

# ---------------------------------------------------------------------------
# MCP (Model Context Protocol) server configuration
# ---------------------------------------------------------------------------
[mcp]
enabled = true
transport = "stdio" # allowed: stdio, sse
server_name = "exoframe"
version = "1.0.0"

[mcp_defaults]
# Default agent ID for MCP tool operations when not explicitly specified
agent_id = "system"

[git]
# Git operations constraints for MCP tools
branch_prefix_pattern = "^(feat|fix|docs|chore|refactor|test)/"
allowed_prefixes = ["feat", "fix", "docs", "chore", "refactor", "test"]

# ---------------------------------------------------------------------------
# Rate limiting configuration
# ---------------------------------------------------------------------------
[rate_limiting]
# Enable rate limiting for AI provider calls
enabled = true
# Maximum API calls per minute across all providers
max_calls_per_minute = 60
# Maximum tokens per hour across all providers
max_tokens_per_hour = 100000
# Maximum cost per day in USD across all providers
max_cost_per_day = 50.00
# Cost per 1K tokens (used for rate limiting calculations)
cost_per_1k_tokens = 0.03

# ---------------------------------------------------------------------------
# Provider strategy configuration
# ---------------------------------------------------------------------------
[provider_strategy]
# Prefer free/local providers over paid ones when available
prefer_free = true
# Allow local providers (Ollama) in selection
allow_local = true
# Maximum daily cost budget in USD
max_daily_cost_usd = 5.00
# Enable health checks before provider selection
health_check_enabled = true
# Enable automatic fallback to alternative providers on failure
fallback_enabled = true

[provider_strategy.task_routing]
# Route tasks by complexity/type (optional)
simple = ["ollama", "google"]
medium = ["google", "anthropic"]
complex = ["anthropic", "openai"]
code_generation = ["anthropic", "openai"]

[provider_strategy.budgets]
# Per-provider daily budgets in USD (optional)
anthropic_daily_usd = 3.00
openai_daily_usd = 2.00

# ---------------------------------------------------------------------------
# Mock provider configuration (for testing/development)
# ---------------------------------------------------------------------------
[mock]
# Delay in milliseconds for mock responses
delay_ms = 500
# Default input tokens for mock responses
input_tokens = 100
# Default output tokens for mock responses
output_tokens = 50

# ---------------------------------------------------------------------------
# Provider-specific overrides
# ---------------------------------------------------------------------------
[providers.google]
cost_tier = "freemium"
free_quota_requests_per_day = 1500
timeout_ms = 30000

[providers.ollama]
cost_tier = "free"
base_url = "http://localhost:11434"
timeout_ms = 60000

[providers.anthropic]
cost_tier = "paid"
timeout_ms = 30000
rate_limit_rpm = 50

# ---------------------------------------------------------------------------
# UI and display configuration
# ---------------------------------------------------------------------------
[ui]
# Maximum length for prompt previews in logs/debugging
prompt_preview_length = 50
# Extended preview length for detailed debugging
prompt_preview_extended = 100

# ---------------------------------------------------------------------------
# Health check configuration
# ---------------------------------------------------------------------------
[health]
check_timeout_ms = 30000
cache_ttl_ms = 300000
memory_warn_percent = 80
memory_critical_percent = 95

# ---------------------------------------------------------------------------
# Git operations configuration
# ---------------------------------------------------------------------------
[git.operations]
# Timeout for git status operations (ms)
status_timeout_ms = 10000
# Timeout for git ls-files operations (ms)
ls_files_timeout_ms = 10000
# Timeout for git checkout operations (ms)
checkout_timeout_ms = 10000
# Timeout for git clean operations (ms)
clean_timeout_ms = 5000
# Timeout for git log operations (ms)
log_timeout_ms = 5000
# Timeout for git diff operations (ms)
diff_timeout_ms = 10000
# Timeout for general git commands (ms)
command_timeout_ms = 30000
# Maximum retries for git operations
max_retries = 3
# Base backoff delay for git retries (ms)
retry_backoff_base_ms = 100
# Maximum retries for branch name collisions
branch_name_collision_max_retries = 5
# Length of trace ID suffix for branches
trace_id_short_length = 8
# Length of random suffix for branches
branch_suffix_length = 6

# ---------------------------------------------------------------------------
# Cost tracking configuration (extended)
# ---------------------------------------------------------------------------
[cost_tracking]
# Batch delay in milliseconds for cost tracking writes
batch_delay_ms = 5000
# Maximum batch size before immediate flush
max_batch_size = 50

# Cost rates per 1K tokens (based on output pricing for conservative estimates)
# Prices as of 2025-2026 API releases
[cost_tracking.rates]
openai = 0.002     # $2.00 per 1M output tokens (gpt-5-mini)
anthropic = 0.005  # $5.00 per 1M output tokens (claude-haiku-4-5)
google = 0.0025    # $2.50 per 1M output tokens (gemini-2.5-flash, Vertex AI)
ollama = 0.0       # Local free
mock = 0.0         # Mock free

[provider_strategy.fallback_chains]
balanced = ["openai", "anthropic", "google"]
fast = ["google", "openai"]
local_first = ["local", "default"]


[quality_gate]
enabled = true
mode = "hybrid"                  # heuristic | llm | hybrid
auto_enrich = true               # enrich requests that score between enrichment and proceed thresholds
block_unactionable = false       # hard-block requests below the minimum threshold
max_clarification_rounds = 5     # maximum Q&A rounds before auto-proceeding

[quality_gate.thresholds]
minimum = 20                     # 0–100; below this the request is rejected or blocked
enrichment = 50                  # 0–100; below this the request is enriched before execution
proceed = 70                     # 0–100; at or above this the request proceeds immediately

[request_analysis]
enabled = true
mode = "hybrid"                  # heuristic | llm | hybrid
actionability_threshold = 60     # 0–100; below this hybrid mode escalates to LLM
infer_acceptance_criteria = true
persist_analysis = true          # write _analysis.json alongside each request file

# ---------------------------------------------------------------------------
# Notes
# - Copy this file to the repository root as `exo.config.toml` or pass a path
#   to the CLI with `--config` when starting the daemon.
# - The `paths.runtime` directory is where runtime artifacts live (DB, logs).
# - Portals should point at real git repositories to enable blueprint/changeset
#   operations across projects.
# - DO NOT edit src/config/constants.ts directly - all user configuration
#   should be done through this exo.config.toml file.
# ---------------------------------------------------------------------------

